name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: pip install -e ".[lint]"

      - name: ruff check
        run: ruff check app/ tests/

      - name: black check
        run: black --check app/ tests/

      - name: mypy
        run: mypy app/api/ app/services/ app/utils/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[api,dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target api -t test-task-pesk-api:ci .

      - name: Build bot image
        run: docker build --target bot -t test-task-pesk-bot:ci .

      - name: Smoke test API container
        run: |
          docker run -d --name api-test \
            -e BOT_TOKEN=0:test \
            -e OWM_API_KEY=test \
            -e EXCHANGE_API_KEY=test \
            -p 8000:8000 \
            test-task-pesk-api:ci
          sleep 5
          curl --fail http://localhost:8000/api/v1/health
          docker stop api-test
