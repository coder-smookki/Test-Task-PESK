<!DOCTYPE html>
<html lang="ru">
<head>

<title>{% block title %}Тест задание — АО «ПЭСК»{% endblock %}</title>

<link rel="stylesheet" href="{{ static_base | default('/static') }}/style.css">
</head>
<body>
